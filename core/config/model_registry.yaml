embeddings:
  # --- CLIP 本地模型（默认，支持跨模态检索：以文搜图 / 以图搜文） ---
  text:
    provider: clip
    model: sentence-transformers/clip-ViT-B-32-multilingual-v1
    dimensions: 512

  # --- 智谱 AI（备选，不支持跨模态检索） ---
  # text:
  #   model: embedding-3
  #   dimensions: 1024
  #   base_url: https://open.bigmodel.cn/api/paas/v4
  #   api_key_env: ZHIPUAI_API_KEY

  # --- 阿里云千问（备选，不支持跨模态检索） ---
